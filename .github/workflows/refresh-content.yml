name: 🥬 Refresh Content
on:
  workflow_call:
    inputs:
      current_commit_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      current_commit_sha:
        description: Commit to refresh from (optional).
        required: false
        type: string
        default: ""

jobs:
  refresh:
    name: 🥬 Refresh Content
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-content-${{ github.ref }}
      cancel-in-progress: true
    env:
      SITE_URL: https://kentcdodds-com.kentcdodds.workers.dev
      WORKER_URL: https://kentcdodds-com.kentcdodds.workers.dev
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: "50"

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --workspace=kentcdodds.com --include-workspace-root

      - name: 🥬 Refresh changed content
        run:
          node ./other/refresh-changed-content.ts ${{ inputs.current_commit_sha
          || github.sha }}
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
