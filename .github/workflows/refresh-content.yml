name: 🥬 Refresh Content
on:
  workflow_call:
    inputs:
      current_commit_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      current_commit_sha:
        description: Commit to refresh from (optional).
        required: false
        type: string
        default: ''

jobs:
  refresh:
    name: 🥬 Refresh Content
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-content-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: '50'

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 🥬 Refresh Content
        run:
          node ./other/refresh-changed-content.ts ${{ inputs.current_commit_sha
          || github.sha }}
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
