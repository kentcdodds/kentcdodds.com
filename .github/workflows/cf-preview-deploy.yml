name: ☁️ CF Preview Deploy

# Deploys the Cloudflare preview of the site from the migration branch. This
# workflow is intentionally scoped to the migration branch and never touches
# production resources.
on:
  push:
    branches:
      - cursor/cloudflare-site-worker-2309

concurrency:
  group: cf-preview-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-site-preview:
    name: 🚀 Deploy site preview worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BUILD_SHA: ${{ github.sha }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --workspace=site-worker --workspace=kentcdodds.com --include-workspace-root

      - name: 🏗️ Build site client + server bundles
        run: npm run build --workspace kentcdodds.com

      - name: 📦 Compile MDX artifacts
        run: npm run mdx:compile --workspace kentcdodds.com -- --out /tmp/mdx-bundle.json

      - name: 🧩 Build app-worker bundle
        run: npm run build:worker --workspace site-worker

      - name: ☁️ Generate preview wrangler config
        run: npm run provision:preview --workspace site-worker

      - name: 🗄️ Apply D1 migrations (remote)
        run: |
          if ! npm run d1:migrations:apply:staging --workspace site-worker; then
            echo "::warning::D1 migrations failed — the CI token likely lacks D1 permissions. The standing preview DB is already migrated; schema changes require manual apply with a privileged token (see docs/agents/cloudflare-worker-architecture.md)."
          fi

      - name: 🚀 Deploy site preview worker
        run: npm run deploy --workspace site-worker 2>&1 | tee deploy-output.txt

      - name: 🔐 Generate worker secrets
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
          CLOUDFLARE_AI_GATEWAY_ID: ${{ secrets.CLOUDFLARE_AI_GATEWAY_ID }}
          CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN }}
          CLOUDFLARE_VECTORIZE_INDEX: ${{ secrets.CLOUDFLARE_VECTORIZE_INDEX }}
          SEARCH_WORKER_URL: ${{ secrets.SEARCH_WORKER_URL }}
          SEARCH_WORKER_TOKEN: ${{ secrets.SEARCH_WORKER_TOKEN }}
          SIMPLECAST_KEY: ${{ secrets.SIMPLECAST_KEY }}
          TRANSISTOR_API_SECRET: ${{ secrets.TRANSISTOR_API_SECRET }}
          CALL_KENT_PODCAST_ID: ${{ secrets.CALL_KENT_PODCAST_ID }}
          CHATS_WITH_KENT_PODCAST_ID: ${{ secrets.CHATS_WITH_KENT_PODCAST_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CALL_KENT_AUDIO_PROCESSOR_CALLBACK_SECRET: ${{ secrets.CALL_KENT_AUDIO_PROCESSOR_CALLBACK_SECRET }}
        run: node services/site-worker/scripts/generate-worker-secrets.mjs --target=staging services/site-worker/.wrangler/preview-secrets.json

      - name: 🔑 Upload worker secrets
        run: npm exec wrangler -- secret bulk services/site-worker/.wrangler/preview-secrets.json --config services/site-worker/generated-wrangler.jsonc

      - name: 🔗 Resolve preview worker URL
        run: |
          WORKER_URL="$(grep -Eo 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy-output.txt | head -1)"
          if [ -z "$WORKER_URL" ]; then
            echo "Could not determine workers.dev URL from deploy output"
            cat deploy-output.txt
            exit 1
          fi
          echo "WORKER_URL=$WORKER_URL" >> "$GITHUB_ENV"

      - name: 📤 Publish MDX artifacts via endpoint
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
        run: npm run publish:artifacts --workspace site-worker -- /tmp/mdx-bundle.json --via-endpoint "$WORKER_URL/resources/mdx-artifacts"

      - name: 🌱 Seed preview D1 (idempotent)
        run: |
          if ! npm run seed:preview-d1 --workspace site-worker; then
            echo "::warning::D1 seed failed — the CI token likely lacks D1 permissions. The standing preview DB is already seeded."
          fi

      - name: ✅ Smoke check deployed preview
        # Every assertion retries: requests right after a deploy can land on
        # cold isolates mid-propagation and see transient errors.
        run: |
          check_with_retries() {
            local label="$1"
            shift
            for attempt in 1 2 3 4; do
              if "$@"; then
                echo "$label passed on attempt $attempt"
                return 0
              fi
              if [ "$attempt" -eq 4 ]; then
                echo "$label failed after 4 attempts"
                return 1
              fi
              echo "$label attempt $attempt failed; retrying in 10s..."
              sleep 10
            done
          }

          check_healthcheck() {
            curl --silent "$WORKER_URL/healthcheck" | grep -Fx 'OK'
          }
          check_page() {
            local path="$1"
            curl --silent --output /dev/null --write-out '%{http_code}' "$WORKER_URL$path" | grep -E '^(200|302)$'
          }
          check_oauth_metadata() {
            curl --silent "$WORKER_URL/.well-known/oauth-authorization-server" | grep -q '"issuer"'
          }

          check_with_retries "healthcheck" check_healthcheck
          check_with_retries "home" check_page /
          check_with_retries "blog" check_page /blog
          check_with_retries "blog post" check_page /blog/super-simple-start-to-remix
          check_with_retries "oauth metadata" check_oauth_metadata
