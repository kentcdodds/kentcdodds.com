name: 🔄 Sync Lexical Search Worker

on:
  workflow_call:
    inputs:
      force:
        required: false
        type: boolean
        default: true
    secrets:
      LEXICAL_SEARCH_WORKER_URL:
        required: true
      LEXICAL_SEARCH_WORKER_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      force:
        description: Force a full lexical sync
        required: false
        type: boolean
        default: true

jobs:
  sync:
    name: 🔄 Sync Lexical Search Worker
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Trigger lexical sync
        env:
          LEXICAL_SEARCH_WORKER_URL: ${{ secrets.LEXICAL_SEARCH_WORKER_URL }}
          LEXICAL_SEARCH_WORKER_TOKEN: ${{ secrets.LEXICAL_SEARCH_WORKER_TOKEN }}
          FORCE_SYNC: ${{ inputs.force }}
        run: |
          set -euo pipefail
          response=$(curl -s -w "\n%{http_code}" --max-time 300 \
            -X POST \
            -H "Authorization: Bearer ${LEXICAL_SEARCH_WORKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"force\": ${FORCE_SYNC}}" \
            "${LEXICAL_SEARCH_WORKER_URL}/admin/sync")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Lexical sync failed (HTTP $http_code):"
            echo "$body"
            exit 1
          fi
          echo "Sync succeeded: $body"
