name: 📦 Deploy Call Kent Audio Container

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Deploy Call Kent Audio Container
    runs-on: ubuntu-latest
    environment: call-kent-audio-container-production
    concurrency:
      group: deploy-call-kent-audio-container-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install workspace deps
        run: npm ci

      - name: 🔬 Lint audio container
        run: npm run lint --workspace call-kent-audio-container

      - name: ʦ Typecheck audio container
        run: npm run typecheck --workspace call-kent-audio-container

      - name: ☁️ Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: call-kent-audio-container
          command: deploy
