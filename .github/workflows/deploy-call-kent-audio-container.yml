name: ☁️ Deploy Call Kent Audio Container

on:
  push:
    branches:
      - main
    paths:
      - call-kent-audio-container/**
      - .github/workflows/deploy-call-kent-audio-container.yml
  workflow_dispatch:

concurrency:
  group: deploy-call-kent-audio-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy Call Kent Audio Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: call-kent-audio-container/package-lock.json

      - name: 📥 Install audio container deps
        run: npm ci
        working-directory: call-kent-audio-container

      - name: 🔬 Lint audio container
        run: npm run lint
        working-directory: call-kent-audio-container

      - name: ʦ Typecheck audio container
        run: npx tsc --noEmit
        working-directory: call-kent-audio-container

      - name: ☁️ Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: call-kent-audio-container
          command: deploy
