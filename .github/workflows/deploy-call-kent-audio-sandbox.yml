name: 📦 Deploy Call Kent Audio Sandbox

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Deploy Call Kent Audio Sandbox
    runs-on: ubuntu-latest
    environment: call-kent-audio-sandbox-production
    concurrency:
      group: deploy-call-kent-audio-sandbox-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install audio sandbox deps
        run: npm ci --workspace=call-kent-audio-sandbox

      - name: 🔬 Lint audio sandbox
        run: npm run lint --workspace call-kent-audio-sandbox

      - name: ʦ Typecheck audio sandbox
        run: npm run typecheck --workspace call-kent-audio-sandbox

      - name: ☁️ Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/call-kent-audio-container
          command: deploy
