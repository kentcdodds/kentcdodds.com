name: 🔐 Deploy OAuth Worker

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: 🔐 Deploy OAuth Worker
    runs-on: ubuntu-latest
    environment: oauth-production
    concurrency:
      group: deploy-oauth-worker-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install OAuth worker deps
        run: npm ci --workspace=oauth

      - name: 🔬 Lint OAuth worker
        run: npm run lint --workspace oauth

      - name: ʦ Typecheck OAuth worker
        run: npm run typecheck --workspace oauth

      - name: ☁️ Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/oauth
          command: deploy --env production
