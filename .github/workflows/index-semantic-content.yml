name: 🔎 Index Semantic Search (content)
on:
  workflow_call:
    inputs:
      before_sha:
        required: false
        type: string
      current_commit_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      before_sha:
        description: Commit to diff from (optional).
        required: false
        type: string
        default: ''
      current_commit_sha:
        description: Commit to index (optional).
        required: false
        type: string
        default: ''

env:
  # Set `SITE_CACHE_VERSION` as a repository variable so all workflows share one
  # knob for invalidation.
  SITE_CACHE_VERSION: ${{ vars.SITE_CACHE_VERSION }}
  NODE_VERSION: 24

jobs:
  index:
    name: 🔎 Index Semantic Search (content)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: index-semantic-content-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install site deps
        run: npm ci --workspace=kentcdodds.com

      - name: 🏄 Copy test env vars
        run: cp services/site/.env.example services/site/.env

      - name: 🏦 Prime Site Cache
        id: site-cache
        uses: actions/cache@v5
        with:
          path: services/site/other/cache.db
          # `other/cache.db` is a derived artifact. Key it off the inputs that can
          # make it stale (content + cache/MDX code + deps), not `github.sha`.
          key: >-
            site-cache-mocks-${{ env.SITE_CACHE_VERSION }}-${{ runner.os
            }}-node${{ env.NODE_VERSION }}-${{ hashFiles(
              'package-lock.json',
              'services/site/app/utils/cache.server.ts',
              'services/site/app/utils/compile-mdx.server.ts',
              'services/site/app/utils/github.server.ts',
              'services/site/app/utils/markdown.server.ts',
              'services/site/app/utils/mdx.server.ts',
              'services/site/content/**',
              'services/site/mocks/**'
            ) }}
          restore-keys: |
            site-cache-mocks-${{ env.SITE_CACHE_VERSION }}-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: 🛠 Setup Database (migrations)
        if: steps.site-cache.outputs.cache-hit != 'true'
        run: npx prisma migrate deploy
        working-directory: services/site

      - name: 🏗 Build (production)
        if: steps.site-cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: 😅 Generate Site Cache
        if: steps.site-cache.outputs.cache-hit != 'true'
        run: npm run prime-cache:mocks

      - name: 🔎 Index changed content
        run: |
          set -euo pipefail
          node --env-file=services/site/.env other/semantic-search/index-repo-content.ts --before "${{ inputs.before_sha || github.event.before }}" --after "${{ inputs.current_commit_sha || github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AI_GATEWAY_ID: ${{ secrets.CLOUDFLARE_AI_GATEWAY_ID }}
          CLOUDFLARE_AI_EMBEDDING_GATEWAY_ID:
            ${{ secrets.CLOUDFLARE_AI_EMBEDDING_GATEWAY_ID }}
          CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN:
            ${{ secrets.CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN }}
          CLOUDFLARE_VECTORIZE_INDEX: ${{ secrets.CLOUDFLARE_VECTORIZE_INDEX }}
          CLOUDFLARE_AI_EMBEDDING_MODEL:
            ${{ secrets.CLOUDFLARE_AI_EMBEDDING_MODEL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

  sync-search-worker:
    needs: index
    uses: ./.github/workflows/sync-search-worker.yml
    secrets: inherit
