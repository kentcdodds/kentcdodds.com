name: 🔎 Index Semantic Search (content)
on:
  workflow_call:
    inputs:
      before_sha:
        required: false
        type: string
      current_commit_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      before_sha:
        description: Commit to diff from (optional).
        required: false
        type: string
        default: ""
      current_commit_sha:
        description: Commit to index (optional).
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: 26

jobs:
  index:
    name: 🔎 Index Semantic Search (content)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: index-semantic-content-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install site deps
        run: npm ci --workspace=kentcdodds.com --include-workspace-root

      - name: 🏄 Copy test env vars
        run: cp services/site/.env.example services/site/.env

      - name: 🗄️ Migrate and seed local D1
        # The JSX-page indexer boots the workerd dev stack, which reads from
        # the local Miniflare D1 database.
        run: npm run db:reset --workspace kentcdodds.com

      - name: 🔎 Index changed content
        run: |
          set -euo pipefail
          node --env-file=services/site/.env other/semantic-search/index-repo-content.ts --before "${{ inputs.before_sha || github.event.before }}" --after "${{ inputs.current_commit_sha || github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AI_GATEWAY_ID: ${{ secrets.CLOUDFLARE_AI_GATEWAY_ID }}
          CLOUDFLARE_AI_EMBEDDING_GATEWAY_ID: ${{ secrets.CLOUDFLARE_AI_EMBEDDING_GATEWAY_ID }}
          CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN }}
          CLOUDFLARE_VECTORIZE_INDEX: ${{ secrets.CLOUDFLARE_VECTORIZE_INDEX }}
          CLOUDFLARE_AI_EMBEDDING_MODEL: ${{ secrets.CLOUDFLARE_AI_EMBEDDING_MODEL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

  sync-search-worker:
    needs: index
    uses: ./.github/workflows/sync-search-worker.yml
    secrets: inherit
