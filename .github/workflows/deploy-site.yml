name: 🚀 Deploy Site
on:
  workflow_call:
    inputs:
      should_deploy:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      should_deploy:
        description: Whether to deploy the production Cloudflare worker.
        required: false
        type: boolean
        default: true

env:
  SITE_CACHE_VERSION: ${{ vars.SITE_CACHE_VERSION }}
  NODE_VERSION: 26

jobs:
  verify:
    name: ✅ Site Gate
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install site deps
        run: npm ci --workspace=kentcdodds.com --include-workspace-root

      - name: 🏄 Copy test env vars
        run: cp services/site/.env.example services/site/.env

      - name: 🧰 Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 🌐 Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run test:e2e:install --workspace kentcdodds.com

      - name: 🔬 Verify site
        run: npm run ci:verify --workspace=kentcdodds.com

      - name: 📦 Upload site build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: site-build-artifacts
          path: |
            services/site/build/
          retention-days: 7

  playwright:
    name: 🎭 Playwright
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🏄 Copy test env vars
        run: cp services/site/.env.example services/site/.env

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install site deps
        run: npm ci --workspace=kentcdodds.com --include-workspace-root

      - name: 🧰 Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 🎬 Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🌐 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run test:e2e:install --workspace kentcdodds.com

      - name: 🧰 Cache MDX dev artifacts
        uses: actions/cache@v5
        with:
          path: services/site/node_modules/.cache/mdx-dev
          key: mdx-dev-${{ runner.os }}-${{ hashFiles('package-lock.json', 'services/site/content/**', 'services/site/other/mdx-artifacts/**', 'services/site/app/utils/**/*mdx*.ts') }}
          restore-keys: |
            mdx-dev-${{ runner.os }}-

      - name: 🎭 Playwright tests
        run: npx playwright test
        working-directory: services/site
        env:
          PORT: 8811
          CI: true

      - name: 📊 Upload report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: services/site/playwright-report/
          retention-days: 30

  deploy:
    # Static name: GitHub does not evaluate job.name expressions for skipped jobs.
    name: 🚀 Deploy Site Worker
    runs-on: ubuntu-latest
    needs: [verify]
    if: ${{ inputs.should_deploy && github.ref == 'refs/heads/main' }}
    environment: site-production
    concurrency:
      group: deploy-site-production
      cancel-in-progress: true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BUILD_SHA: ${{ github.sha }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --workspace=site-worker --workspace=kentcdodds.com --include-workspace-root

      - name: 🏗️ Build site client + server bundles
        run: npm run build --workspace kentcdodds.com

      - name: 📦 Compile MDX artifacts
        run: npm run mdx:compile --workspace kentcdodds.com -- --out /tmp/mdx-bundle.json

      - name: 🧩 Build app-worker bundle
        run: npm run build:worker --workspace site-worker

      - name: ☁️ Generate wrangler config
        run: npm run provision:production --workspace site-worker

      - name: 🗄️ Apply D1 migrations (remote)
        run: npm run d1:migrations:apply:production --workspace site-worker

      - name: 🚀 Deploy worker
        run: npm run deploy --workspace site-worker 2>&1 | tee deploy-output.txt

      - name: 🔐 Generate worker secrets
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
          CLOUDFLARE_AI_GATEWAY_ID: ${{ secrets.CLOUDFLARE_AI_GATEWAY_ID }}
          CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_AI_GATEWAY_AUTH_TOKEN }}
          CLOUDFLARE_VECTORIZE_INDEX: ${{ secrets.CLOUDFLARE_VECTORIZE_INDEX }}
          SEARCH_WORKER_URL: ${{ secrets.SEARCH_WORKER_URL }}
          SEARCH_WORKER_TOKEN: ${{ secrets.SEARCH_WORKER_TOKEN }}
          SIMPLECAST_KEY: ${{ secrets.SIMPLECAST_KEY }}
          TRANSISTOR_API_SECRET: ${{ secrets.TRANSISTOR_API_SECRET }}
          CALL_KENT_PODCAST_ID: ${{ secrets.CALL_KENT_PODCAST_ID }}
          CHATS_WITH_KENT_PODCAST_ID: ${{ secrets.CHATS_WITH_KENT_PODCAST_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CALL_KENT_AUDIO_PROCESSOR_CALLBACK_SECRET: ${{ secrets.CALL_KENT_AUDIO_PROCESSOR_CALLBACK_SECRET }}
        run: |
          SECRETS_FILE=services/site-worker/.wrangler/production-secrets.json
          node services/site-worker/scripts/generate-worker-secrets.mjs --target=production "$SECRETS_FILE"
          echo "SECRETS_FILE=$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: 🔑 Upload worker secrets
        run: npm exec wrangler -- secret bulk "$SECRETS_FILE" --config services/site-worker/generated-wrangler.jsonc

      - name: 🔗 Resolve worker URL
        run: |
          WORKER_URL="$(grep -Eo 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy-output.txt | head -1)"
          if [ -z "$WORKER_URL" ]; then
            echo "Could not determine workers.dev URL from deploy output"
            cat deploy-output.txt
            exit 1
          fi
          echo "WORKER_URL=$WORKER_URL" >> "$GITHUB_ENV"

      - name: 📤 Publish MDX artifacts via endpoint
        env:
          REFRESH_CACHE_SECRET: ${{ secrets.REFRESH_CACHE_SECRET }}
        run: npm run publish:artifacts --workspace site-worker -- /tmp/mdx-bundle.json --via-endpoint "$WORKER_URL/resources/mdx-artifacts"

      - name: ✅ Smoke check deployed worker
        run: |
          check_with_retries() {
            local label="$1"
            shift
            for attempt in 1 2 3 4; do
              if "$@"; then
                echo "$label passed on attempt $attempt"
                return 0
              fi
              if [ "$attempt" -eq 4 ]; then
                echo "$label failed after 4 attempts"
                return 1
              fi
              echo "$label attempt $attempt failed; retrying in 10s..."
              sleep 10
            done
          }

          check_healthcheck() {
            curl --silent "$WORKER_URL/healthcheck" | grep -Fx 'OK'
          }
          check_page() {
            local path="$1"
            curl --silent --output /dev/null --write-out '%{http_code}' "$WORKER_URL$path" | grep -E '^(200|302)$'
          }
          check_rss_items() {
            # Floor assertion: catches an empty/broken feed without failing
            # whenever a post is published or removed.
            local count
            count="$(curl --silent "$WORKER_URL/blog/rss.xml" | grep -c '<item>')"
            [ "$count" -ge 200 ]
          }

          check_with_retries "healthcheck" check_healthcheck
          check_with_retries "home" check_page /
          check_with_retries "blog" check_page /blog
          check_with_retries "blog post" check_page /blog/super-simple-start-to-remix
          check_with_retries "rss items" check_rss_items
