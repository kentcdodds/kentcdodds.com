name: ⚙️ Deploy Call Kent Audio Worker

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: ⚙️ Deploy Call Kent Audio Worker
    runs-on: ubuntu-latest
    environment: call-kent-audio-worker-production
    concurrency:
      group: deploy-call-kent-audio-worker-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install audio worker deps
        run: npm ci --workspace=call-kent-audio-worker

      - name: 🔬 Lint audio worker
        run: npm run lint --workspace call-kent-audio-worker

      - name: ʦ Typecheck audio worker
        run: npm run typecheck --workspace call-kent-audio-worker

      - name: 🧪 Test audio worker
        run: npm run test --workspace call-kent-audio-worker

      - name: ☁️ Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/call-kent-audio-worker
          command: deploy
